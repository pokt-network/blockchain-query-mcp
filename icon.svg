<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#f6f6f6"/>

  <!-- Define gradients and styles -->
  <defs>
    <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#025af2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a6fff;stop-opacity:1" />
    </linearGradient>
    <filter id="nodeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15" flood-color="#025af2"/>
    </filter>
  </defs>

  <!-- Connection lines (background layer) -->
  <g stroke="#025af2" stroke-width="3" stroke-linecap="round" opacity="0.3">
    <!-- Lines connecting nodes -->
    <line x1="160" y1="160" x2="352" y2="160"/>
    <line x1="160" y1="160" x2="256" y2="352"/>
    <line x1="352" y1="160" x2="256" y2="352"/>
    <line x1="352" y1="160" x2="352" y2="352"/>
    <line x1="160" y1="160" x2="160" y2="352"/>
  </g>

  <!-- Connection lines (foreground layer with higher opacity) -->
  <g stroke="#025af2" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <!-- Center hub connections -->
    <line x1="256" y1="128" x2="256" y2="256"/>
    <line x1="128" y1="256" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="384" y2="256"/>
    <line x1="256" y1="256" x2="256" y2="384"/>
  </g>

  <!-- Node 1 (Top) -->
  <circle cx="256" cy="128" r="32" fill="url(#nodeGradient)" filter="url(#nodeShadow)"/>
  <circle cx="256" cy="128" r="32" fill="#025af2" opacity="0"/>

  <!-- Node 2 (Left) -->
  <circle cx="128" cy="256" r="32" fill="url(#nodeGradient)" filter="url(#nodeShadow)"/>

  <!-- Node 3 (Center) -->
  <circle cx="256" cy="256" r="40" fill="url(#nodeGradient)" filter="url(#nodeShadow)"/>

  <!-- Node 4 (Right) -->
  <circle cx="384" cy="256" r="32" fill="url(#nodeGradient)" filter="url(#nodeShadow)"/>

  <!-- Node 5 (Bottom) -->
  <circle cx="256" cy="384" r="32" fill="url(#nodeGradient)" filter="url(#nodeShadow)"/>

  <!-- Inner dots for visual depth -->
  <circle cx="256" cy="128" r="16" fill="#f6f6f6" opacity="0.4"/>
  <circle cx="128" cy="256" r="16" fill="#f6f6f6" opacity="0.4"/>
  <circle cx="256" cy="256" r="20" fill="#f6f6f6" opacity="0.4"/>
  <circle cx="384" cy="256" r="16" fill="#f6f6f6" opacity="0.4"/>
  <circle cx="256" cy="384" r="16" fill="#f6f6f6" opacity="0.4"/>
</svg>
